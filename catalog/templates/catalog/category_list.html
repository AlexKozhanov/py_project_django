{% extends 'catalog/template.html' %}
{% load my_tags %}
{% block content %}
<!-- Раздел2 Категории -->
<div class="container px-4 py-5" id="featured-3"> <!-- container с текстами -->
    <h2 class="pb-2 border-bottom text-center">Категории</h2>
    <p class="lead text-center">Все категории</p>

    <p>
        <a class="btn btn-primary" href="{% url 'catalog:category_create' %}" role="button">Создать категорию</a>
    </p>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for object in object_list %}
        <div class="col">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ object.name }}</h5><!-- Заголовок карточки -->
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="btn-group">
                            <a class="btn btn-primary" href="{% url 'catalog:category_detail' object.pk %}" role="button">Подробнее</a>
                            <a class="btn btn-primary" href="{% url 'catalog:category_update' object.pk %}" role="button">Редактировать</a>
                            <a class="btn btn-primary" href="{% url 'catalog:category_products' object.id %}" >Посмотреть продукты</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

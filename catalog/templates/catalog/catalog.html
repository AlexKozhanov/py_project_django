{% extends 'catalog/template.html' %}
{% load my_tags %}
{% block content %}
<!-- Раздел2 Категории -->
<div class="container px-4 py-5" id="featured-3"> <!-- container с текстами -->
    <h2 class="pb-2 border-bottom text-center">Columns with icons</h2>
    <p class="lead text-center">Ваши ежедневные новости и истории</p>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for product in products %}
        <div class="col">
            <div class="card shadow-sm">
<!--                <svg aria-label="Placeholder: Thumbnail" class="bd-placeholder-img card-img-top" height="225" preserveAspectRatio="xMidYMid slice" role="img" width="100%">-->
<!--                    <title>Placeholder</title>-->
<!--                    <rect width="100%" height="100%" fill="#55595c"></rect>-->
<!--                    <text x="50%" y="50%" fill="#eceeef" dy=".3em">Thumbnail</text>-->
<!--                </svg>-->
                <img src="{{ product.photo | media_filter }}">
                <div class="card-body">
                    <h5 class="card-title">Заголовок карточки</h5>
                    <p class="card-text">{{ product.name }}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="btn-group">
                            <a class="btn btn-primary" href="{% url 'catalog:product_detail' product.pk %}" role="button">Подробнее</a>
                        </div>
                        <small class="text-body-secondary">9 mins</small>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> <!-- Кодировка страницы -->
    <meta name ="viewport" content="width=device-width, initial-scale=1">
    <title>Заголовок страницы</title> <!-- Заголовок -->
    <link href="static/css/bootstrap.min.css" rel="stylesheet"> <!-- Подключение локальных файлов стилей Bootstrap -->
</head>
<body> <!-- Тело страницы -->
<h1 class="text-center">Заголовок</h1> <!-- Заголовок на странице -->
<div class="row">
    <div class="col-2"></div>
    <div class="col-8">
        <div class="row">
            <div class="col-12">
                <a class="btn btn-link" href="http://my.sky.pro">Личный кабинет</a> <!-- Ссылка -->
            </div>
            <hr>
            <div class="col-12">
                <!-- Изображение https://variety.com/wp-content/uploads/2021/07/Rick-Astley-Never-Gonna-Give-You-Up.png -->
                <!-- <img src="https://i.pinimg.com/originals/19/89/44/198944ea9f57d70ea850fc868efbd4b6.jpg" class="img-thumbnail rounded mx-auto d-block" alt="..."> -->
                <img src="static/img/cat.jpg" class="img-thumbnail rounded mx-auto d-block" alt="...">
            </div>
            <hr>
            <div class="col-12 mt-5">
                <!-- Форма со сбором имени и почты -->
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Почта</label>
                        <input placeholder="email@yandex.ru" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">Введите почту</div>
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Имя</label>
                        <input placeholder="Иван Иванов" type="text" class="form-control" id="exampleInputPassword1">
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button> <!-- Кнопка отправки формы -->
                </form>
            </div>
            <hr>
            <div class="col-12 mt-3">
                <ul class="list-group"> <!-- Список с перечислением -->
                    <li class="list-group-item">An item</li>
                    <li class="list-group-item">A second item</li>
                    <li class="list-group-item">A third item</li>
                    <li class="list-group-item">A fourth item</li>
                    <li class="list-group-item">And a fifth one</li>
                </ul>
            </div>
            <hr>
            <div class="col-12">
                <!-- Таблица с данными -->
                <table class="table table-striped">
                    <thead>
                        <tr>
                          <th scope="col">#</th>
                          <th scope="col">First</th>
                          <th scope="col">Last</th>
                          <th scope="col">Handle</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                          <th scope="row">1</th>
                          <td>Mark</td>
                          <td>Otto</td>
                          <td>@mdo</td>
                        </tr>
                        <tr>
                          <th scope="row">2</th>
                          <td>Jacob</td>
                          <td>Thornton</td>
                          <td>@fat</td>
                        </tr>
                        <tr>
                          <th scope="row">3</th>
                          <td>John</td>
                          <td>Doe</td>
                          <td>@social</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="col-2"></div>
</div>
</body>
</html>
